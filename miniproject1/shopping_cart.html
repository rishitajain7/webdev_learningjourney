<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->

    <div id="header">

        <h2>Thala<span>7.</span></h2>

        <div id="navlinks">
            <a href="index.html">Home ▽</a>
            <a href="#">About ▽</a>
            <a href="#">Brands ▽</a>
            <a href="#">More ▽</a>
            <a href="#">Contact ▽</a>
        </div>

        <input type="text" id="search" placeholder="Search">

    </div>
    <div id="cartContainer">
        <div id="left">
            <h1>Shopping Cart</h1>
            <table>
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Quantity</th>
                        <th>Price</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>
                            <div class="product">
                                <img src="images/shoes_image.png" alt="Shoe">
                                <p>Seven By M.S.Dhoni Women's Running Shoes</p>
                            </div>
                        </td>
                        <td class="quantity"> <span>-</span>
                            1 <span>+</span>
                        </td>
                        <td>₹4,999</td>
                        <td class="remove">Remove</td>
                                        </tr>
                </tbody>
            </table>
            <a href="index.html">← Continue Shopping</a>
        </div>
<div id="right">
            <div id="coupon">
                <h3>Enter Coupon Code</h3>
                <div class="coupon-box">
                    <input type="text" placeholder="Coupon-code">
                    <button>Apply Coupon</button>
                </div>
            </div>
            <div id="bill">                
                        <div class="row"><span>Sub Total</span> <span>₹4,700</span>
                </div>
                <div class="row"><span>Taxes</span><span>₹179</span>
                </div>
                <div class="row">
                    <span>Discount</span>
                    <span>₹0</span>
                </div>
                <hr>
                <div class="row total">
                    <span>Total</span>
                    <span>₹4899</span>
                </div>
            </div>
            <button id="payBtn">pay Now ₹4,999</button>
        </div>
    </div>
</body>
</html>
