<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white">
    <header class="sticky top-0 z-50 bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-8 py-5 flex justify-between items-center shadow-lg">
            <h1 class="text-4xl font-bold"><ion-icon name="flash"></ion-icon>Project</h1>
            <nav class="flex items-center gap-10">
                <a href="#" class="text-gray-600 hover:text-blue-900">Product</a>
                <a href="#" class="text-gray-600 hover:text-blue-900">Solutions</a>
                <a href="#" class="text-gray-600 hover:text-blue-900">Resources</a>
                <a href="#" class="text-gray-600 hover:text-blue-900">Pricing</a>
                <a href="#" class="text-gray-600 hover:text-blue-900">Log In</a>
                <button class="bg-black text-white px-6 py-3 rounded-lg hover:bg-blue-900 shadow-lg">Get AI Free <ion-icon name="arrow-forward-outline"></ion-icon></button>
            </nav>
        </div>
    </header>

    <section class="bg-yellow-200/40">
        <div class="max-w-7xl mx-auto text-center pt-10 pb-10 relative">
            <h2 class="text-7xl font-bold text-gray-900 ">Write, plan, share.
        <br>With AI at your side.</h2>
            <p class="text-gray-500 mt-8">It is the connected workspace where better,faster work happens. Now with AI.</p>
            <div class="mt-12 flex justify-center gap-6 relative">
                <button class="bg-black text-white px-8 py-4 shadow-lg">Get AI Free <ion-icon name="arrow-forward-outline"></ion-icon></button>
                <button class="bg-blue-800 text-white px-8 py-4 shadow-lg">Request demo <ion-icon name="browsers-outline"></ion-icon></button>
            </div>
            <div class="relative mt-24">
                <img src="https://thumbs.wbm.im/pw/small/713c4b594cc41875b912167192a42f52.jpg" alt="dashboard" class="w-[700px] mx-auto rounded-l">
                <div class="absolute left-8 top-20 bg-white p-4 rounded-xl w-52">
                    <p class="text-sm font-semibold text-gray-800 shadow-lg"><ion-icon name="clipboard-outline"></ion-icon> Tasks</p>
                    <p class="text-sm text-gray-500 mt-2">18 tasks completed today!</p>
                </div>
                <div class="absolute right-8 top-12 bg-white p-4 rounded-xl shadow-xl w-52">
                    <p class="text-sm font-semibold text-green-600 shadow-lg"><ion-icon name="checkmark-outline"></ion-icon> Project Status</p>
                    <p class="text-sm text-gray-500 mt-2"> On Track</p>
                </div>
                <div class="absolute right-12 bottom-8 bg-white p-4 rounded-xl shadow-xl w-52">
                    <p class="text-sm font-semibold text-gray-800 shadow-lg"><ion-icon name="people-outline"></ion-icon> Team Activity</p>
                    <div class="flex mt-5">
                        <img src="https://www.shutterstock.com/image-vector/simple-circular-user-person-shape-260nw-2304632133.jpg" class="w-8 h-8 rounded-full border-2 border-white">
                        <img src="https://www.shutterstock.com/image-vector/simple-circular-user-person-shape-260nw-2304632133.jpg" class="w-8 h-8 rounded-full -ml-2 border-2 border-white">
                        <img src="https://www.shutterstock.com/image-vector/simple-circular-user-person-shape-260nw-2304632133.jpg" class="w-8 h-8 rounded-full -ml-2 border-2 border-white">
                    </div>
                    <p class="text-sm text-gray-500 mt-2">+7 online</p>
                </div>
            </div>
        </div>
    </section>

    <div class="fixed bottom-6 right-6 z-50">
        <button class="w-14 h-14 rounded-full bg-blue-700 text-white text-2xl hover:bg-indigo-700"><ion-icon name="chatbubble-outline"></ion-icon></button>
    </div>
<script type="module" src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.js"></script>
</body>

</html>
